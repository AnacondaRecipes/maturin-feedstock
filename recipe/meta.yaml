{% set name = "maturin" %}
{% set version = "1.14.0" %}

package:
  name: {{ name }}-suite
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f7f82a6aca4a6c402bf00b99200be199d4874d04b9b9e74e825726a3478bba7f

build:
  number: 0
  missing_dso_whitelist:
    - $RPATH/api-ms-win-core-winrt-error-l1-1-0.dll  # [win]
  skip: true  # [py<37]

outputs:
  - name: {{ name }}
    script: bld-win.bat  # [win]
    script: build-unix.sh  # [not win]
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('c') }}
        - {{ compiler('rust') }}
      host:
        - pip
        - python
        - setuptools >=77.0.0
        - tomli >=1.1.0  # [py<311]
        - setuptools-rust >=1.11.0
      run:
        - python
        - tomli >=1.1.0  # [py<311]
      run_constrained:
        - ziglang >=0.10.0
    test:
      imports:
        - maturin
      requires:
        - pip
      commands:
        - pip check
        - maturin -V
        - maturin --help
        - maturin build --help

  - name: {{ name }}-gnu
    script: bld-win.bat
    build:
      skip: true  # [not win]
    requirements:
      build:
        - {{ compiler('m2w64_c') }}
        - {{ compiler('rust-gnu') }}
      host:
        - pip
        - python
        - setuptools >=77.0.0
        - tomli >=1.1.0  # [py<311]
        - setuptools-rust >=1.11.0
      run:
        - python
        - tomli >=1.1.0  # [py<311]
      run_constrained:
        - ziglang >=0.10.0
    test:
      imports:
        - maturin
      requires:
        - pip
      commands:
        - pip check
        - maturin -V
        - maturin --help
        - maturin build --help

about:
  home: https://www.maturin.rs
  license: MIT OR Apache-2.0
  license_family: MIT
  license_file: license-mit
  summary: >-
    Build and publish crates with pyo3, rust-cpython and cffi bindings as well as rust binaries as python packages
  description: |
    Build and publish crates with pyo3, cffi and uniffi bindings as well as rust binaries as python packages with minimal configuration.
    It supports building wheels for python 3.8+ on Windows, Linux, macOS and FreeBSD, can upload them to pypi and has basic PyPy and GraalPy support.
  dev_url: https://github.com/PyO3/maturin
  doc_url: https://www.maturin.rs

extra:
  recipe-maintainers:
    - apcamargo
  skip-lints:
    - host_section_needs_exact_pinnings
